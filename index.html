<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motocicletas en México: Uso Seguro y Riesgos Reales 2025-2026</title>
  <meta name="description" content="Estadísticas actualizadas de riesgos en moto en México, causas principales y consejos de seguridad.">
  <style>
    :root {
      --primary: #c53030;
      --dark: #1f2937;
      --light: #f9fafb;
      --warning: #d97706;
      --success: #15803d;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #333;
      background: var(--light);
    }
    header {
      background: linear-gradient(135deg, var(--primary), #991b1b);
      color: white;
      text-align: center;
      padding: 4rem 1rem 3rem;
    }
    header h1 { font-size: 2.8rem; margin-bottom: 0.5rem; }
    header p  { font-size: 1.35rem; max-width: 800px; margin: 0 auto; opacity: 0.95; }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    section {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      margin: 2.5rem 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }
    h2 {
      color: var(--primary);
      border-left: 7px solid var(--primary);
      padding-left: 1.1rem;
      margin: 2rem 0 1.3rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin: 1.8rem 0;
    }
    .stat-card {
      background: #fff5f5;
      border-left: 6px solid var(--primary);
      padding: 1.4rem;
      border-radius: 8px;
      font-weight: 500;
    }
    .consejo {
      background: #f0fdf4;
      border-left: 6px solid var(--success);
      padding: 1.4rem;
      border-radius: 8px;
      margin: 1.2rem 0;
    }
    .alert {
      background: #fefce8;
      border-left: 6px solid var(--warning);
      padding: 1.4rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      color: #713f12;
    }
    ul { list-style: none; padding-left: 0; }
    ul li { padding-left: 2rem; position: relative; margin: 0.9rem 0; }
    ul li::before { content: "⚠️"; position: absolute; left: 0; font-size: 1.2rem; }
    .check-list li::before { content: "✅"; }
    footer {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #666;
      font-size: 0.95rem;
      border-top: 1px solid #ddd;
      margin-top: 4rem;
    }
    @media (max-width: 768px) {
      header h1 { font-size: 2.3rem; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>Motocicletas en México</h1>
    <p>Libertad sobre dos ruedas… pero el vehículo más letal en nuestras calles (datos 2025-2026)</p>
  </div>
</header>

<div class="container">

  <section>
    <h2>Realidad actual en México y Zona Metropolitana</h2>

      <div class="stat-card">
